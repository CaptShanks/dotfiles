set -g default-terminal "screen-256color"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# enable mouse
set-option -g mouse on
set -g set-clipboard on

# Hyperlinks and undercurl support
set -as terminal-features ",*:hyperlinks"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Automatic window renaming
setw -g automatic-rename on
setw -g automatic-rename-format '#{pane_current_command}:#{b:pane_current_path}'

# history-limit
set -g history-limit 10000

# Copy mode
bind Space copy-mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# resize panes
bind -r down resize-pane -D 10
bind -r up resize-pane -U 10
bind -r right resize-pane -R 10
bind -r left resize-pane -L 10
bind -r m resize-pane -Z

# refresh config
unbind r
bind r source-file ~/.tmux.conf

# Plugins and theme
set -g @plugin 'tmux-plugins/tpm'
if-shell 'command -v urlview >/dev/null 2>&1 || command -v extract_url >/dev/null 2>&1' "set -g @plugin 'tmux-plugins/tmux-urlview'"
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'fabioluciano/tmux-tokyo-night'

set -g @theme_variation 'night'
set -g @theme_left_separator ''
set -g @theme_right_separator ''
set -g @theme_enable_icons 1
set -g @theme_disable_plugins 0
set -g @theme_transparent_status_bar 'false'
set -g @theme_plugins 'datetime'

# Smart pane switching with awareness of Vim splits.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# fancy output selector
bind-key b {
    copy-mode
    send-keys -X clear-selection
    send-keys -X cursor-up
    send-keys -X start-of-line
    send-keys -X search-backward "󰇙"
    send-keys -X cursor-down
    send-keys -X start-of-line
    send-keys -X begin-selection
    send-keys -X search-forward "󰇙"
    send-keys -X cursor-up
    send-keys -X cursor-up
    send-keys -X end-of-line
    send-keys -X stop-selection
}

# override any plugin based mappings
unbind h
bind s split-window -h -c "#{pane_current_path}"
unbind v
bind v split-window -v -c "#{pane_current_path}"
unbind x
bind x kill-pane
bind-key z resize-pane -Z
unbind C-x

# Keep inactive panes readable.
setw -g window-active-style bg=terminal
setw -g window-style bg=terminal

run '~/.tmux/plugins/tpm/tpm'
